name: CI

# ai-helpers is a meta-package: it ships no source of its own, only a curated
# set of dependency pins and extras. So the SERVER gate is deliberately tiny —
# it proves the package is well-formed and that the whole suite still RESOLVES
# on PyPI, without installing the heavy wheels (torch, the ffmpeg-backed
# helpers, LibreOffice, …). The expensive, real end-to-end example tests run
# LOCALLY, before the push, via .githooks/pre-push — so a fault is caught on the
# coder's machine instead of burning server minutes. Enable the hook once per
# clone:
#   git config core.hooksPath .githooks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve:
    name: build + resolve suite (light)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Build the meta sdist/wheel and validate its metadata. This catches a
      # broken pyproject (malformed metadata, a bad extra) with no heavy install.
      - name: Build + metadata check
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      # Resolve the ENTIRE suite graph from PyPI without installing it.
      # --dry-run runs pip's resolver over "[all]" (every helper, including
      # wallet-helper) and reports what WOULD be installed, so an unresolvable
      # or mistyped pin fails here — but no multi-GB wheels are downloaded or
      # compiled. This is the meaningful, cheap server gate for a meta-package.
      - name: Resolve the full suite (dry-run, no heavy install)
        run: pip install --dry-run ".[all]"
