name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: pip install (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: System deps (ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install full suite via meta-package (all extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Smoke import all ten helpers
        run: |
          python -c "
          import os_helper, audio_helper, video_helper, sftp_helper
          import youtube_helper, bucket_helper, podcast_helper, capture_helper
          import vocal_helper, speaker_helper
          print('all 10 helpers importable')
          "

  # ────────────────────────────────────────────────────────────────────
  # Examples end-to-end — prove the README / site snippets actually run,
  # not just import. Installs the full toolchain (ffmpeg + pandoc +
  # LibreOffice) and the suite, then runs tests/test_examples.py:
  #   * the deterministic "Composed example" core (audio → transcript →
  #     docx/pdf) runs FOR REAL on a committed speech clip;
  #   * the YouTube acquisition tests are `slow` and SKIP cleanly when the
  #     external service is unreachable, so a flaky third party never turns
  #     the build red.
  # ────────────────────────────────────────────────────────────────────
  examples:
    name: examples end-to-end (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: System deps (ffmpeg + pandoc + LibreOffice)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg pandoc libreoffice-writer

      - name: Install the full suite + pytest
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,test]"

      # YouTube answers "Sign in to confirm you're not a bot" to datacenter IPs
      # (all CI runners). The fix that needs no personal cookies is a proof-of-origin
      # (PO) token provider: run bgutil's provider and install its yt-dlp plugin, and
      # yt-dlp (hence youtube-helper) fetches a PO token and downloads normally.
      - name: Start bgutil PO-token provider (bypass YouTube bot check)
        run: |
          docker run -d --name bgutil-provider -p 4416:4416 \
            brainicism/bgutil-ytdlp-pot-provider:latest
          # give the node server a moment to come up
          sleep 8
      - name: Install the yt-dlp PO-token plugin
        run: pip install bgutil-ytdlp-pot-provider

      - name: Run the example tests (composed example runs for real)
        run: python -m pytest tests/test_examples.py -v
